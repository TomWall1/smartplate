name: Weekly Deal Refresh

on:
  schedule:
    - cron: '0 17 * * 2'  # Tuesday 5pm UTC = Wednesday 4am AEDT
  workflow_dispatch:       # Allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly deal refresh + recipe generation
        run: |
          echo "Triggering Deal to Dish weekly pipeline at $(date)"
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            https://deals-to-dish-api.onrender.com/api/admin/refresh-deals)
          echo "Response status: $response"
          if [ "$response" != "202" ]; then
            echo "❌ Pipeline trigger failed with status $response"
            exit 1
          fi
          echo "✅ Pipeline triggered — deals refresh + recipe generation running in background"
